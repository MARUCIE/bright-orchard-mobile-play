<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#31531f">
  <meta property="og:title" content="明亮果园">
  <meta property="og:description" content="慢慢摘，不着急">

  <title>明亮果园 · 手机试玩</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #719747; }
    body::before { content: ""; position: fixed; inset: -30px; background: url('orchard-bg.webp') center / cover; filter: blur(14px) brightness(.88); transform: scale(1.06); }
    .shell { position: relative; width: min(100vw, 56.25vh); height: 100vh; margin: auto; overflow: hidden; background: url('orchard-bg.webp') center / cover; box-shadow: 0 0 60px #18361666; }
    .shell::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(#0002, transparent 24%, transparent 75%, #0003); }
    .top { position: absolute; z-index: 50; top: max(14px, env(safe-area-inset-top)); left: 14px; right: 14px; display: flex; justify-content: space-between; align-items: center; }
    .brand, .sound, .harvest-button, .hint { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); background: #ffffffcf; border: 1px solid #ffffffcc; box-shadow: 0 8px 24px #12260c2e; }
    .brand { border-radius: 999px; padding: 10px 16px; line-height: 1.05; }
    .brand strong { display: block; font-size: 20px; letter-spacing: .02em; }
    .brand small { color: #47543f; font-weight: 650; }
    .sound { border-radius: 50%; width: 48px; height: 48px; display: grid; place-items: center; padding: 0; color: #1d3216; font-size: 22px; cursor: pointer; }
    .apple { --s: 1; --dx: 0px; --dy: 0px; --rot: 0deg; --twig-scale: 1; position: absolute; z-index: 12; width: clamp(62px, 16vw, 105px); height: clamp(62px, 16vw, 105px); padding: 0; border: 0; background: transparent; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--s)) rotate(var(--rot)); transform-origin: 50% -8%; cursor: grab; transition: transform .26s cubic-bezier(.2,.8,.2,1), opacity .45s ease; touch-action: none; -webkit-tap-highlight-color: transparent; will-change: transform; }
    .apple img { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .apple::before { content: ""; position: absolute; z-index: 2; left: calc(50% - 3px); top: -7px; width: 7px; height: 23px; border-radius: 5px; background: linear-gradient(90deg, #4a2810, #95613a 50%, #3c210d); transform: rotate(8deg) scaleY(var(--twig-scale)); transform-origin: top; }
    .apple::after { content: ""; position: absolute; z-index: 0; left: 19%; right: 19%; bottom: 8%; height: 13%; border-radius: 50%; background: radial-gradient(ellipse, #0007 0, #0003 48%, transparent 72%); transform: translateY(7px); }
    .apple.dragging { z-index: 18; cursor: grabbing; transition: none; }
    .apple.tease { animation: apple-tease .35s ease; }
    .apple.picked { z-index: 42; pointer-events: none; animation: apple-to-basket .82s cubic-bezier(.36,.04,.72,.52) forwards; }
    .apple.stored { visibility: hidden; animation: none; }
    @keyframes apple-tease { 30% { rotate: -7deg; } 65% { rotate: 8deg; } }
    @keyframes apple-to-basket {
      0% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--s)) rotate(var(--rot)); opacity: 1; }
      18% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) - 18px)) scale(calc(var(--s) * .97)) rotate(18deg); opacity: 1; }
      84% { opacity: 1; }
      100% { transform: translate(calc(-50% + var(--fall-x)), calc(-50% + var(--fall-y))) scale(.34) rotate(var(--fall-rot)); opacity: 1; }
    }
    .flower { --lift: 0px; --stem-h: 112px; --lean: 0deg; --flip: 1; position: absolute; z-index: 13; bottom: 1.5%; width: 58px; height: var(--stem-h); padding: 0; border: 0; background: transparent; transform: translate(-50%, calc(0px - var(--lift))); transform-origin: 50% 100%; cursor: grab; transition: transform .25s ease, opacity .3s ease; touch-action: none; -webkit-tap-highlight-color: transparent; will-change: transform; }
    .flower-plant { width: 100%; height: 100%; object-fit: fill; pointer-events: none; transform: scaleX(var(--flip)) rotate(var(--lean)); transform-origin: 50% 100%; }
    .flower.dragging { cursor: grabbing; transition: none; }
    .flower.picked { z-index: 43; pointer-events: none; animation: flower-to-basket .72s cubic-bezier(.36,.04,.72,.52) forwards; }
    .flower.stored { visibility: hidden; animation: none; }
    @keyframes flower-to-basket {
      0% { transform: translate(-50%, calc(0px - var(--lift))) scale(1) rotate(0deg); opacity: 1; }
      20% { transform: translate(-50%, calc(-18px - var(--lift))) scale(.96) rotate(-8deg); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--flower-fall-x)), calc(0px - var(--lift) + var(--flower-fall-y))) scale(.4) rotate(var(--flower-fall-rot)); opacity: 1; }
    }
    .hint { position: absolute; z-index: 50; left: 50%; top: max(172px, calc(env(safe-area-inset-top) + 158px)); transform: translateX(-50%); white-space: nowrap; color: white; background: #1721179f; border-color: #ffffff42; padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 750; pointer-events: none; }
    .basket { position: absolute; z-index: 50; right: 14px; top: max(82px, calc(env(safe-area-inset-top) + 68px)); display: flex; gap: 10px; pointer-events: none; }
    .harvest-button { width: 72px; height: 72px; padding: 0; border-radius: 50%; color: #294720; display: grid; place-items: center; align-content: center; line-height: 1; }
    .count-button { gap: 5px; font-size: 11px; font-weight: 850; }
    .count-button .count-title { color: #48603f; letter-spacing: .08em; }
    .count-values { display: flex; align-items: center; gap: 5px; white-space: nowrap; font-size: 13px; color: #172514; }
    .reset { gap: 2px; pointer-events: auto; cursor: pointer; border: 2px solid #5b9554; background: #f7fbf1d9; font-weight: 850; }
    .reset-icon { font-size: 27px; line-height: .85; }
    .reset-label { font-size: 11px; letter-spacing: .05em; }
    .reset:active { transform: scale(.94); }
    .collection-basket { position: absolute; z-index: 20; bottom: 1.7%; pointer-events: none; }
    .fruit-basket { left: 48%; width: 25%; height: 16%; }
    .flower-basket { right: 2.5%; width: 25%; height: 13.5%; }
    .basket-label { position: absolute; z-index: 6; left: 50%; bottom: 4px; transform: translateX(-50%); padding: 3px 8px; border-radius: 999px; color: #fff9dc; background: #523216cc; border: 1px solid #e9c98b99; box-shadow: 0 2px 7px #0005; font-size: 10px; font-weight: 800; white-space: nowrap; }
    .flower-wicker { position: absolute; z-index: 1; left: 4%; right: 4%; bottom: 0; height: 54%; border: 3px solid #6a3c18; border-radius: 10px 10px 28px 28px; background: repeating-linear-gradient(3deg, #8d541f 0 5px, #bd7a38 5px 9px, #724016 9px 12px); box-shadow: inset 0 6px 8px #e5aa5b77, 0 8px 13px #17240d77; }
    .flower-wicker::before { content: ""; position: absolute; left: 14%; right: 14%; bottom: 54%; height: 72%; border: 6px solid #6b3e1b; border-bottom: 0; border-radius: 999px 999px 0 0; box-shadow: inset 2px 0 #c18746, 2px 0 #3a210e; }
    .basket-fill { position: absolute; z-index: 3; pointer-events: none; }
    .fruit-basket .basket-fill { left: 4%; right: 4%; bottom: 16%; height: 71%; overflow: visible; }
    .fruit-basket::after { content: ""; position: absolute; z-index: 4; left: 5%; right: 5%; bottom: 5%; height: 31%; border-radius: 7px 7px 24px 24px; background: repeating-linear-gradient(4deg, #724016dd 0 4px, #b67735e8 4px 7px, #88501de8 7px 10px); border: 2px solid #613918cc; box-shadow: inset 0 5px 6px #e6aa5a66; }
    .flower-basket .basket-fill { left: -8%; right: -3%; bottom: 17%; height: 144%; overflow: visible; }
    .flower-basket .flower-wicker { z-index: 4; }
    .fruit-token, .flower-token { position: absolute; left: var(--pile-left); bottom: var(--pile-bottom); transform-origin: 50% 100%; transform: translateX(-50%) rotate(var(--pile-rot)) scale(var(--pile-scale)); }
    .fruit-token { z-index: var(--pile-layer); width: 34px; height: auto; }
    .flower-token { z-index: var(--pile-layer); width: 34px; height: 78px; object-fit: fill; }
    .fruit-token.landing-pop, .flower-token.landing-pop { animation: pile-settle .34s cubic-bezier(.2,.9,.3,1.15); }
    @keyframes pile-settle {
      0% { transform: translateX(-50%) translateY(-16px) rotate(var(--pile-rot)) scale(var(--pile-entry-scale)); opacity: .35; }
      68% { transform: translateX(-50%) translateY(2px) rotate(var(--pile-rot)) scale(var(--pile-bounce-scale)); opacity: 1; }
      100% { transform: translateX(-50%) rotate(var(--pile-rot)) scale(var(--pile-scale)); opacity: 1; }
    }
    @media (min-aspect-ratio: 1/1) {
      .shell { border-radius: 28px; height: 94vh; margin-top: 3vh; }
    }
    @media (max-aspect-ratio: 3/4) {
      body::before { display: none; }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="明亮果园手机与iPad视觉验收">
    <div class="top"><div class="brand"><strong>明亮果园</strong><small>慢慢摘，不着急</small></div><button class="sound" type="button" aria-label="关闭音效" aria-pressed="true">🔊</button></div>
    <button class="apple" style="left:19%;top:20%;--s:.82"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:39%;top:15%;--s:.72"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:63%;top:17%;--s:.88"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:82%;top:24%;--s:.7"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:27%;top:34%;--s:.95"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:52%;top:31%;--s:.76"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:76%;top:38%;--s:.91"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:16%;top:49%;--s:.7"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:41%;top:47%;--s:1"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:67%;top:52%;--s:.78"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:29%;top:59%;--s:.79"><img src="apple.webp" alt="苹果"></button>
    <button class="apple" style="left:80%;top:60%;--s:.92"><img src="apple.webp" alt="苹果"></button>
    <button class="flower" style="left:8%;--stem-h:132px;--lean:-3deg" aria-label="摘白色波斯菊"><img class="flower-plant" src="flower-white.webp" alt=""></button>
    <button class="flower" style="left:18%;--stem-h:94px;--flip:-1;--lean:4deg" aria-label="摘粉色波斯菊"><img class="flower-plant" src="flower-pink.webp" alt=""></button>
    <button class="flower" style="left:29%;--stem-h:122px;--lean:2deg" aria-label="摘黄色金光菊"><img class="flower-plant" src="flower-yellow.webp" alt=""></button>
    <button class="flower" style="left:40%;--stem-h:84px;--flip:-1;--lean:-4deg" aria-label="摘红色虞美人"><img class="flower-plant" src="flower-red.webp" alt=""></button>
    <button class="flower" style="left:60%;--stem-h:91px;--lean:3deg" aria-label="摘粉色波斯菊"><img class="flower-plant" src="flower-pink.webp" alt=""></button>
    <button class="flower" style="left:70%;--stem-h:126px;--flip:-1;--lean:1deg" aria-label="摘白色波斯菊"><img class="flower-plant" src="flower-white.webp" alt=""></button>
    <button class="flower" style="left:81%;--stem-h:99px;--lean:-2deg" aria-label="摘黄色金光菊"><img class="flower-plant" src="flower-yellow.webp" alt=""></button>
    <button class="flower" style="left:92%;--stem-h:137px;--flip:-1;--lean:4deg" aria-label="摘红色虞美人"><img class="flower-plant" src="flower-red.webp" alt=""></button>
    <div class="collection-basket fruit-basket" aria-label="苹果篮">
      <div class="basket-fill" id="fruit-fill"></div><span class="basket-label">苹果篮</span>
    </div>
    <div class="collection-basket flower-basket" aria-label="鲜花篮">
      <div class="basket-fill" id="flower-fill"></div><div class="flower-wicker"></div><span class="basket-label">鲜花篮</span>
    </div>
    <div class="hint">☝️ 按住苹果左右拧，再向下拉</div>
    <div class="basket" aria-label="果园操作">
      <div class="harvest-button count-button" role="status" aria-live="polite"><span class="count-title">数量</span><span class="count-values"><span>🍎<b id="count">0</b></span><span>🌼<b id="flower-count">0</b></span></span></div>
      <button class="harvest-button reset" type="button" aria-label="重新长满"><span class="reset-icon" aria-hidden="true">↻</span><span class="reset-label">长满</span></button>
    </div>
  </main>
  <script>
    let audioContext;
    let soundOn = true;

    function getAudioContext() {
      if (!soundOn) return null;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      audioContext ??= new AudioContextClass();
      if (audioContext.state === 'suspended') audioContext.resume();
      return audioContext;
    }

    function tone(frequency, duration, delay = 0, volume = .05, type = 'sine') {
      const context = getAudioContext();
      if (!context) return;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const start = context.currentTime + delay;
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + .008);
      gain.gain.exponentialRampToValueAtTime(.0001, start + duration);
      oscillator.connect(gain).connect(context.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + .02);
    }

    function softNoise(delay = 0, duration = .07, volume = .025) {
      const context = getAudioContext();
      if (!context) return;
      const length = Math.ceil(context.sampleRate * duration);
      const buffer = context.createBuffer(1, length, context.sampleRate);
      const samples = buffer.getChannelData(0);
      for (let index = 0; index < length; index += 1) {
        samples[index] = (Math.random() * 2 - 1) * (1 - index / length);
      }
      const source = context.createBufferSource();
      const filter = context.createBiquadFilter();
      const gain = context.createGain();
      filter.type = 'bandpass';
      filter.frequency.value = 1150;
      gain.gain.value = volume;
      source.buffer = buffer;
      source.connect(filter).connect(gain).connect(context.destination);
      source.start(context.currentTime + delay);
    }

    function playStemBreak() {
      tone(620, .055, 0, .055, 'triangle');
      softNoise(.025, .08, .032);
    }

    function playBasketLanding() {
      tone(145, .14, 0, .052, 'sine');
      softNoise(.015, .1, .02);
    }

    function playFlowerSound() {
      tone(740, .16, 0, .035, 'sine');
      tone(990, .22, .07, .025, 'sine');
    }

    function playGrowthSound() {
      tone(392, .12, 0, .032, 'sine');
      tone(523, .14, .08, .032, 'sine');
      tone(659, .2, .16, .03, 'sine');
    }

    let generation = 0;
    let picked = 0;
    let flowersPicked = 0;
    let activeApple = null;
    let activeFlower = null;
    const apples = [...document.querySelectorAll('.apple')];
    const flowers = [...document.querySelectorAll('.flower')];
    const savedTension = new WeakMap();
    const fruitPileSlots = [
      [15, 2, -10, .90], [38, 0, 5, .98], [62, 3, -5, .92], [84, 1, 11, .86],
      [25, 20, 8, .92], [50, 19, -7, 1], [75, 21, 10, .90],
      [16, 38, -6, .88], [42, 39, 5, .94], [68, 38, -3, .90],
      [34, 57, -8, .86], [58, 58, 7, .88]
    ];
    const flowerPileSlots = [
      [12, -7, -18, .95], [28, -5, -10, 1.12], [45, -7, -4, 1.28], [60, -6, 3, 1.20],
      [75, -8, 10, 1.08], [80, -6, 18, .94], [36, -9, 7, .98], [66, -9, -8, 1.04]
    ];

    function placeInPile(token, slot, layer) {
      const [left, bottom, rotation, scale] = slot;
      token.style.setProperty('--pile-left', `${left}%`);
      token.style.setProperty('--pile-bottom', `${bottom}px`);
      token.style.setProperty('--pile-rot', `${rotation}deg`);
      token.style.setProperty('--pile-scale', scale);
      token.style.setProperty('--pile-entry-scale', scale * .7);
      token.style.setProperty('--pile-bounce-scale', scale * 1.08);
      token.style.setProperty('--pile-layer', layer);
    }

    function updateProgress() {
      document.querySelector('#count').textContent = picked;
      document.querySelector('#flower-count').textContent = flowersPicked;
    }

    function showHint(message) {
      const hint = document.querySelector('.hint');
      hint.textContent = message;
      hint.style.display = 'block';
    }

    function storeApple() {
      const token = document.createElement('img');
      token.src = 'apple.webp';
      token.alt = '';
      token.className = 'fruit-token landing-pop';
      placeInPile(token, fruitPileSlots[(picked - 1) % fruitPileSlots.length], picked);
      document.querySelector('#fruit-fill').append(token);
    }

    function storeFlower(flower) {
      const token = document.createElement('img');
      token.className = 'flower-token landing-pop';
      token.src = flower.querySelector('.flower-plant').getAttribute('src');
      token.alt = '';
      placeInPile(token, flowerPileSlots[flowersPicked % flowerPileSlots.length], flowersPicked + 1);
      document.querySelector('#flower-fill').append(token);
    }

    function landApple(apple) {
      if (apple.classList.contains('picked')) return;
      const fruit = apple.getBoundingClientRect();
      const currentX = Number.parseFloat(apple.style.getPropertyValue('--dx')) || 0;
      const currentY = Number.parseFloat(apple.style.getPropertyValue('--dy')) || 0;
      const target = document.querySelector('.fruit-basket').getBoundingClientRect();
      const basketX = target.left + target.width * (.36 + Math.random() * .28);
      const basketY = target.top + target.height * (.48 + Math.random() * .14);
      apple.style.setProperty('--fall-x', `${currentX + basketX - (fruit.left + fruit.width / 2)}px`);
      apple.style.setProperty('--fall-y', `${currentY + basketY - (fruit.top + fruit.height / 2)}px`);
      apple.style.setProperty('--fall-rot', `${105 + Math.random() * 90}deg`);
      apple.classList.remove('dragging', 'tease');
      apple.classList.add('picked');
      activeApple = null;
      playStemBreak();
      navigator.vibrate?.([20, 22, 34]);
      document.querySelector('.hint').style.display = 'none';

      const expectedGeneration = generation;
      window.setTimeout(() => {
        if (generation !== expectedGeneration || !apple.classList.contains('picked')) return;
        playBasketLanding();
        navigator.vibrate?.(28);
        picked += 1;
        updateProgress();
        apple.classList.add('stored');
        storeApple();
      }, 820);
    }

    function recordAppleDrag(state, clientX, clientY) {
      const movementX = clientX - state.lastX;
      const displacementX = clientX - state.startX;
      const displacementY = Math.max(0, clientY - state.startY);
      const addedPull = Math.max(0, displacementY - state.pull);
      state.lastX = clientX;
      state.travel += Math.abs(movementX);
      state.pull = Math.max(state.pull, displacementY);
      state.effort = Math.min(1, state.effort + Math.abs(movementX) / 145 + addedPull / 95 * .55);
      state.visual = {
        dx: Math.max(-18, Math.min(18, displacementX * .2)),
        dy: Math.min(30, displacementY * .28),
        rotation: Math.max(-22, Math.min(22, displacementX * .48)),
        twigScale: 1 + state.effort * .48
      };

      const pulse = state.effort > .72 ? 2 : state.effort > .4 ? 1 : 0;
      if (pulse > state.pulse) {
        state.pulse = pulse;
        navigator.vibrate?.(pulse === 1 ? 12 : 20);
        tone(pulse === 1 ? 280 : 360, .045, 0, .018, 'triangle');
      }
      return state.effort >= 1;
    }

    function scheduleAppleFrame(state) {
      if (state.frameRequest) return;
      state.frameRequest = requestAnimationFrame(() => {
        state.frameRequest = 0;
        if (activeApple !== state || !state.visual) return;
        const { dx, dy, rotation, twigScale } = state.visual;
        state.apple.style.setProperty('--dx', `${dx}px`);
        state.apple.style.setProperty('--dy', `${dy}px`);
        state.apple.style.setProperty('--rot', `${rotation}deg`);
        state.apple.style.setProperty('--twig-scale', String(twigScale));
      });
    }

    apples.forEach(apple => {
      apple.addEventListener('pointerdown', event => {
        if (apple.classList.contains('picked')) return;
        if (activeApple || activeFlower) return;
        getAudioContext();
        apple.setPointerCapture(event.pointerId);
        activeApple = {
          apple,
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          lastX: event.clientX,
          travel: 0,
          pull: 0,
          effort: savedTension.get(apple) || 0,
          pulse: 0,
          frameRequest: 0,
          visual: null
        };
        apple.classList.remove('tease');
        apple.classList.add('dragging');
      });

      apple.addEventListener('pointermove', event => {
        if (!activeApple || activeApple.apple !== apple || activeApple.pointerId !== event.pointerId) return;
        const state = activeApple;
        if (recordAppleDrag(state, event.clientX, event.clientY)) {
          landApple(apple);
          return;
        }
        scheduleAppleFrame(state);
      });

      const release = event => {
        if (!activeApple || activeApple.apple !== apple || activeApple.pointerId !== event.pointerId) return;
        const state = activeApple;
        if (state.frameRequest) cancelAnimationFrame(state.frameRequest);
        const wasTap = state.travel < 7 && state.pull < 7;
        savedTension.set(apple, state.effort * .62);
        activeApple = null;
        apple.classList.remove('dragging');
        apple.style.setProperty('--dx', '0px');
        apple.style.setProperty('--dy', '0px');
        apple.style.setProperty('--rot', '0deg');
        apple.style.setProperty('--twig-scale', '1');
        if (wasTap) {
          apple.classList.add('tease');
          window.setTimeout(() => apple.classList.remove('tease'), 360);
          showHint('按住它，左右拧一拧，再向下拉');
          tone(230, .07, 0, .015, 'sine');
        }
      };
      apple.addEventListener('pointerup', release);
      apple.addEventListener('pointercancel', release);
      apple.addEventListener('click', event => {
        if (event.detail === 0) landApple(apple);
      });
    });

    function pickFlower(flower) {
      if (flower.classList.contains('picked')) return;
      const blossom = flower.querySelector('.flower-plant').getBoundingClientRect();
      const target = document.querySelector('.flower-basket').getBoundingClientRect();
      const basketX = target.left + target.width * (.36 + Math.random() * .28);
      const basketY = target.top + target.height * (.48 + Math.random() * .12);
      flower.style.setProperty('--flower-fall-x', `${basketX - (blossom.left + blossom.width / 2)}px`);
      flower.style.setProperty('--flower-fall-y', `${basketY - (blossom.top + blossom.height / 2)}px`);
      flower.style.setProperty('--flower-fall-rot', `${55 + Math.random() * 75}deg`);
      if (activeFlower?.frameRequest) cancelAnimationFrame(activeFlower.frameRequest);
      flower.classList.remove('dragging');
      flower.classList.add('picked');
      activeFlower = null;
      playFlowerSound();
      navigator.vibrate?.(20);
      document.querySelector('.hint').style.display = 'none';

      const expectedGeneration = generation;
      window.setTimeout(() => {
        if (generation !== expectedGeneration || !flower.classList.contains('picked')) return;
        flower.classList.add('stored');
        storeFlower(flower);
        playBasketLanding();
        navigator.vibrate?.(24);
        flowersPicked += 1;
        updateProgress();
      }, 720);
    }

    flowers.forEach(flower => {
      flower.addEventListener('pointerdown', event => {
        if (flower.classList.contains('picked')) return;
        if (activeApple || activeFlower) return;
        getAudioContext();
        flower.setPointerCapture(event.pointerId);
        activeFlower = { flower, pointerId: event.pointerId, startY: event.clientY, lift: 0, frameRequest: 0 };
        flower.classList.add('dragging');
      });
      flower.addEventListener('pointermove', event => {
        if (!activeFlower || activeFlower.flower !== flower || activeFlower.pointerId !== event.pointerId) return;
        const state = activeFlower;
        state.lift = Math.max(0, state.startY - event.clientY);
        if (state.lift >= 34) {
          flower.style.setProperty('--lift', '34px');
          pickFlower(flower);
          return;
        }
        if (!state.frameRequest) {
          state.frameRequest = requestAnimationFrame(() => {
            state.frameRequest = 0;
            if (activeFlower !== state) return;
            flower.style.setProperty('--lift', `${Math.min(38, state.lift)}px`);
          });
        }
      });
      const releaseFlower = event => {
        if (!activeFlower || activeFlower.flower !== flower || activeFlower.pointerId !== event.pointerId) return;
        const state = activeFlower;
        if (state.frameRequest) cancelAnimationFrame(state.frameRequest);
        const wasTap = state.lift < 5;
        activeFlower = null;
        flower.classList.remove('dragging');
        flower.style.setProperty('--lift', '0px');
        if (wasTap) showHint('按住鲜花，轻轻向上提起');
      };
      flower.addEventListener('pointerup', releaseFlower);
      flower.addEventListener('pointercancel', releaseFlower);
      flower.addEventListener('click', event => {
        if (event.detail === 0) pickFlower(flower);
      });
    });
    document.querySelector('.reset').addEventListener('click', () => {
      generation += 1;
      picked = 0;
      flowersPicked = 0;
      activeApple = null;
      activeFlower = null;
      apples.forEach(apple => {
        apple.classList.remove('picked', 'stored', 'dragging', 'tease');
        apple.style.setProperty('--dx', '0px');
        apple.style.setProperty('--dy', '0px');
        apple.style.setProperty('--rot', '0deg');
        apple.style.setProperty('--twig-scale', '1');
        savedTension.delete(apple);
      });
      flowers.forEach(flower => {
        flower.classList.remove('picked', 'stored', 'dragging');
        flower.style.setProperty('--lift', '0px');
      });
      document.querySelector('#fruit-fill').replaceChildren();
      document.querySelector('#flower-fill').replaceChildren();
      updateProgress();
      playGrowthSound();
      navigator.vibrate?.(12);
      showHint('按住苹果左右拧，再向下拉');
    });
    const soundButton = document.querySelector('.sound');
    soundButton.addEventListener('click', () => {
      soundOn = !soundOn;
      soundButton.textContent = soundOn ? '🔊' : '🔇';
      soundButton.setAttribute('aria-label', soundOn ? '关闭音效' : '打开音效');
      soundButton.setAttribute('aria-pressed', String(soundOn));
      if (soundOn) playFlowerSound();
    });
  </script>
</body>
</html>
